<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Can Speak French — Bouche-à-oreille</title>
<style>
  :root {
    --navy: #1B2A4A;
    --gold: #B8975A;
    --cream: #F7F4EF;
    --sand: #D8CFC0;
    --charcoal: #2C2C2C;
    --white: #FDFCFA;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    line-height: 1.6;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 1.25rem; }

  /* Header */
  header {
    background: var(--navy);
    color: var(--cream);
    padding: 2.5rem 1.25rem;
    text-align: center;
  }
  header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--gold);
    margin-bottom: 0.5rem;
  }
  header p { opacity: 0.8; font-size: 1rem; }
  header .sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--gold);
    margin-top: 0.5rem;
  }

  /* Month tabs */
  .month-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    justify-content: center;
    padding: 1.25rem;
    background: var(--white);
    border-bottom: 2px solid var(--sand);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .month-btn {
    padding: 0.4rem 0.9rem;
    background: var(--cream);
    border: 1px solid var(--sand);
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--navy);
    transition: all 0.2s;
  }
  .month-btn:hover { background: var(--gold); color: var(--white); border-color: var(--gold); }
  .month-btn.active { background: var(--navy); color: var(--cream); border-color: var(--navy); }

  /* Month section */
  .month-section { display: none; }
  .month-section.active { display: block; }
  .month-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.5rem;
    color: var(--navy);
    margin: 1.5rem 0 0.25rem;
  }
  .month-subtitle {
    font-size: 0.85rem;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 1.5rem;
  }

  /* Expression card */
  .expr-card {
    background: var(--white);
    border-radius: 8px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 8px rgba(27,42,74,0.06);
    border-left: 4px solid var(--gold);
  }
  .expr-number {
    font-size: 0.75rem;
    color: var(--gold);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .expr-french {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.3rem;
    color: var(--navy);
    margin: 0.3rem 0 0.2rem;
    font-weight: 700;
  }
  .expr-english { font-size: 1rem; color: var(--navy); opacity: 0.8; margin-bottom: 0.15rem; font-weight: 500; }
  .expr-context {
    font-size: 0.85rem;
    color: var(--charcoal);
    opacity: 0.7;
    margin-bottom: 0.75rem;
    font-style: italic;
  }

  /* Audio controls */
  .audio-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }
  .audio-row audio {
    height: 2.25rem;
    flex: 1;
    min-width: 180px;
  }
  .btn {
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .btn-navy { background: var(--navy); color: var(--cream); }
  .btn-navy:hover { opacity: 0.9; }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { opacity: 0.9; }
  .btn-recording { background: #dc3545; color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .btn-playback { background: #28a745; color: white; }
  .btn-playback:hover { opacity: 0.9; }

  /* Echo bounce workflow */
  .echo-steps {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
    font-size: 0.78rem;
    color: var(--charcoal);
    opacity: 0.6;
  }
  .echo-steps span { display: flex; align-items: center; gap: 0.3rem; }
  .echo-steps .step-done { opacity: 1; color: var(--gold); font-weight: 600; }

  /* Loading */
  .loading { text-align: center; padding: 3rem; color: var(--charcoal); opacity: 0.5; }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem 1.25rem;
    font-size: 0.8rem;
    color: var(--charcoal);
    opacity: 0.5;
    border-top: 1px solid var(--sand);
    margin-top: 2rem;
  }
  footer a { color: var(--gold); text-decoration: none; }

  @media (max-width: 600px) {
    .expr-french { font-size: 1.1rem; }
    .month-btn { font-size: 0.7rem; padding: 0.3rem 0.7rem; }
  }
</style>
</head>

<script>
// ===== EXPRESSION DATA =====
const MONTHS = {"1": {"theme": "Bonjour, baguette, voisins", "count": 24, "expressions": ["Bonjour !", "Bonjour, vous êtes ouvert ?", "Vous avez choisi ?", "Je vous mets un petit pain avec ?", "Je peux payer comment ?", "Je voudrais une baguette, pas trop cuite, s'il vous plaît.", "Sur place ou à emporter ?", "Vous me faites une remise si j'en prends trois ?", "C'est pour offrir.", "Vous avez la carte ?", "Je peux goûter ?", "L'addition, s'il vous plaît ! On partage.", "Je vous dois combien ?", "Vous auriez l'heure, s'il vous plaît ?", "Je peux vous emprunter… ?", "Il y a quelqu'un ?", "Ça vous dérange si… ?", "On se voit quand ? / Tu es libre quand ? / Vous êtes libre quand ?", "Amène les enfants ! / Amène le chien ! / Amène ton copain !", "Tu restes manger ? / Vous restez manger ?", "Tu sais quoi ? / Vous savez quoi ?", "En fait,…", "Du coup,…", "Genre, … / En mode, …"], "contexts": ["Vous entrez dans une boulangerie, un café, une boutique. C'est **toujours** la première syllabe. Même si on achète un chewing-gum.", "Vous arrivez devant une boutique. Vous poussez la porte. Le rituel commence. Cette phrase + un sourire = vous avez gagné 80 % de l'interaction.", "Le serveur s'approche, vous regarde. Cette phrase + un silence poli = il attend que vous répondiez.", "Le \"upsell\" français, rituel et poli. On peut dire oui ou non sans perdre la face.", "À la fin de l'achat, dans un petit commerce, un marché, une boulangerie. Vous ne savez pas s'ils prennent la CB.", "La phrase la plus française du monde. Le secret : \"*pas trop cuite*\" est une **injonction sociale**, pas un caprice — une baguette trop cuite = dure, c'est un signal que vous savez de quoi vous parlez.", "C'est la question piège qui fait geler 90 % des anglophones (cf. post Reddit viral *\"I was feeling good about managing to order and then this got me stumped\"*). On l'entend dans **tous** les cafés, boulangeries, kebabs.", "Au marché, chez le fromager, à la poissonnerie. Le marchand **adore** cette question — c'est le rituel. La réponse est souvent \"non\", mais la question fait partie du jeu social.", "Vous achetez du vin, des fleurs, une boîte de chocolats. Le commerçant va emballer, faire un paquet-cadeau, parfois un reçu spécial. Cette phrase suffit.", "Au marché, dans un petit commerce, où la CB n'est pas toujours acceptée (surtout < 5-10 €). Demander *\"Vous avez la carte ?\"* = \"Je peux payer par carte ?\"", "Le geste **rituel** du marché français. Le commerçant coupe un morceau, vous tend. Vous goûtez, vous dites *\"C'est bon !\"* (ou *\"Bof, un peu trop salé pour moi\"*), vous achetez (ou pas).", "À la fin du repas au restaurant, entre amis. Le serveur vient : *\"Vous voulez l'addition ?\"* / *\"Vous prenez un café ?\"* / *\"Vous voulez le dessert ?\"* (trois tentatives de rétention). Vous tenez bon : *\"Non merci, l'addition s'il vous plaît\"*.", "Chez le coiffeur, le garagiste, un artisan, après un service. Le client et le prestataire s'entendent sur le prix **après**, dans une sorte de négociation polie.", "Dans la rue, à un café (où il n'y a pas d'horloge visible), à un arrêt de bus. Le **conditionnel** (*\"vous auriez\"*) est crucial : il adoucit, il est poli sans être formel.", "Chez un voisin, à un dîner, dans une location de vacances. L'art de la **dette polie** : vous empruntez, vous rendez, parfois en mieux. C'est un lien social.", "Vous sonnez chez un voisin, un ami, un client. Vous attendez. La porte s'ouvre (ou pas). C'est la formule standard.", "L'art de la **demande polie** en français. Vous anticipez l'inconvénient que vous pourriez causer. C'est un **rituel de politesse**, pas une vraie question juridique.", "Avec un ami, un voisin, un collègue. Vous voulez caler un moment. La forme la plus naturelle est **inversée** par rapport à l'anglais : on commence par *\"quand\"*, pas par *\"pouvons-nous\"*.", "Entre amis, en famille, voisins proches. **Amener** une personne ou un animal = l'inviter à venir avec vous. Notez l'élision naturelle : *\"amène-les\"* (et pas *\"amène les\"* — la liaison se fait).", "L'invitation la plus française. Spontanée, généreuse, presque toujours **honnête**. Si on vous la fait, elle est sérieuse. La réponse polie n'est pas *\"non merci\"* — c'est *\"oh, je ne veux pas déranger…\"* puis oui si on insiste.", "Pour **amorceur** une confidence, une annonce, un scoop. *\"Tu sais quoi ? J'ai croisé Paul au marché ce matin !\"* L'interlocuteur sait qu'il va apprendre un truc.", "LA **charnière** du français parlé. *\"Je voulais y aller, **en fait** j'ai pas pu.\"* Sert à nuancer, à se corriger, à préciser après coup. Sans *\"en fait\"*, votre français sonne sec, saccadé.", "Le marqueur de **conséquence vécue** par opposition à la conséquence logique. *\"Il pleuvait, **du coup** on est restés à la maison.\"* C'est l'intonation de la vraie vie.", "**Réservé** aux moins de 35-40 ans environ. Sert à illustrer, à donner un exemple, à préciser. *\"J'étais genre, devant la boulangerie, et là, il est arrivé.\"*"]}, "2": {"theme": "Au bureau", "count": 25, "expressions": ["Bonjour tout le monde !", "Salut, tu vas bien ?", "Tu as passé un bon weekend ?", "Je peux te parler cinq minutes ?", "On se fait un café ?", "On peut commencer ?", "Je vais vous présenter [le projet / les chiffres / la proposition].", "Je voulais rebondir sur ce que tu as dit…", "Je suis d'accord, mais… [nuance / objection]", "Je vais faire le point sur… [l'avancement du projet / les prochaines étapes]", "Qu'est-ce que tu en penses ?", "On peut passer au point suivant ?", "Merci à tous ! On se retrouve [jeudi / la semaine prochaine / demain] à la même heure.", "Je vous fais un mail / Je t'envoie un mail.", "Je vous remercie de votre retour.", "Allô, bonjour ! Je suis bien chez [Nom de l'entreprise] ? Je cherche [prénom], s'il vous plaît.", "Vous êtes libre là ?", "Je suis sur un truc urgent, je te rappelle ?", "Bon, je vais y aller. On se tient au courant ?", "Je peux vous poser une question rapide ?", "Dans l'ensemble, c'est bien / c'est pas mal.", "J'aurais aimé que tu développes davantage [la partie analyse / la conclusion / le budget].", "Ce qui est bien, c'est que… / Le point positif, c'est que…", "J'ai noté ça / Je retiens ça.", "Bon courage pour la suite !"], "contexts": ["Vous arrivez le matin, vous passez la porte. C'est une annonce collective pour briser la glace. On peut le dire à voix haute en entrant, puis saluer individuellement les plus proches.", "Après le \"Bonjour [prénom]\", la question rituelle. On n'attend pas une vraie réponse détaillée. *\"Oui, et toi ?\"* suffit. C'est un marqueur social, pas un check-up médical.", "Le lundi matin à la machine à café ou en arrivant. C'est la question \"safe\" qui ne rentre pas dans la vie privée, mais qui montre qu'on s'intéresse. La réponse standard : *\"Oui, tranquille, et toi ?\"*", "Vous avez besoin d'aborder un sujet rapidement. Vous passez la tête dans le bureau d'un collègue ou vous l'attrapez à la pause. La réponse classique : *\"Oui, je finis ça et j'arrive.\"*", "L'invitation rituelle entre collègues. À 10h, à 15h, après une réunion tendue. C'est un signal social : \"je veux discuter en off\" ou \"faisons une pause\". Se refuser à un café = un signe social qu'on ne maîtrise pas.", "Le lancement d'une réunion, quand la plupart des gens sont arrivés. La personne qui anime la réunion le dit en regardant l'assemblée. Si quelqu'un manque, on dit : *\"On attend encore deux minutes ?\"*", "Le début de votre slide. Vous avez la parole, vous annoncez le plan. Regardez les gens, pas l'écran. Faites une pause après cette phrase.", "La façon polie d'intervenir dans une réunion sans couper la parole. Vous prenez appui sur le commentaire précédent pour ajouter le vôtre. C'est la marque d'un bon participant.", "La structure typique de la contradiction polie à la française. On commence par un \"je suis d'accord\" (souvent un peu vrai), puis le \"mais\" introduit l'objection. Sans le \"je suis d'accord\", l'objection est perçue comme agressive.", "En réunion, quand votre tour arrive pour donner des nouvelles d'un projet. *\"Faire le point\"* = donner le statut, les progrès, les blocages. C'est plus professionnel que *\"update\"*.", "La question magique de la réunion française pour solliciter quelqu'un. Le chef la pose pour inclure un silencieux, un collègue la pose pour débloquer une décision. Réponse typique : *\"Moi, je pense que…\"* ou *\"Honnêtement, je…\"*", "Vous sentez qu'on s'attarde trop sur un point, ou l'ordre du jour vous attend. La question polie pour faire avancer la réunion. La réponse est toujours oui, suivie d'un regard au chef qui valide.", "La clôture de la réunion. On remercie, on annonce la prochaine, on se lève. Parfois suivi de *\"Bon après-midi !\"* / *\"Bon courage pour la suite !\"*", "En fin de conversation ou de réunion, pour confirmer ce qui a été dit par écrit. *\"Je vous fais un mail avec les chiffres.\"* C'est une promesse. Si vous ne le faites pas, on vous relancera.", "Dans un mail ou en fin de conversation, après avoir reçu un avis, des commentaires, une validation. *\"retour\"* = feedback, commentaires, réponse.", "Appel professionnel. On dit *\"Allô, bonjour\"* (les deux), on confirme qu'on est au bon endroit, on demande la personne. La personne au bout du fil répond : *\"C'est de la part de qui ?\"* → vous répondez : *\"C'est [prénom], de [service / entreprise].\"*", "Vous toquez à la porte ou vous arrivez au bureau d'un collègue. Vous vérifiez qu'il n'est pas en réunion ou au téléphone avant de déballer votre sujet. La réponse peut être *\"Oui, vas-y\"* ou *\"Là, c'est chaud, on se parle dans une heure ?\"*", "Un collègue arrive pour parler, ou le téléphone sonne, mais vous êtes au milieu d'une tâche qui ne peut pas attendre. La réponse polie pour reporter sans vexer.", "La fin d'une conversation à la machine à café, dans le couloir, ou après une réunion informelle. Le *\"Bon\"* d'ouverture + l'annonce + la promesse de suivi. Ça permet de couper proprement.", "Vous avez besoin d'une info, vous passez au bureau de quelqu'un qui n'est pas votre manager direct. La formule *\"rapide\"* rassure : vous ne bloquerez pas la personne longtemps.", "Pour ouvrir un feedback. *\"Dans l'ensemble, c'est pas mal du tout\"* = c'est vraiment bien (le *\"pas mal\"* peut être un compliment fort selon l'intonation). *\"C'est bien\"* tout seul = c'est correct, sans plus.", "La critique constructive dans un feedback. Le **conditionnel passé** (*j'aurais aimé*) est crucial : il exprime le regret poli, pas l'exigence. *\"davantage\"* (plus soutenu que \"plus\") ajoute du professionnalisme.", "Pour introduire un feedback positif avant d'en venir aux axes d'amélioration. *\"Ce qui est bien, c'est que vous avez rendu le rapport à l'heure. Ce qu'on peut améliorer, c'est la structure.\"*", "En recevant un feedback, on montre qu'on a entendu et qu'on va l'intégrer. *\"J'ai noté ça\"* = \"I've taken that on board\". *\"Je retiens ça\"* = \"I'll keep that in mind\". Deux façons d'accuser réception poliment.", "La formule de clôture après un feedback, un rapport remis, une mission accomplie. C'est un encouragement. *\"Bon courage pour la suite, et n'hésitez pas si vous avez des questions.\"*"]}, "3": {"theme": "Les sorties", "count": 25, "expressions": ["Tu fais quoi ce soir ? / Vous faites quoi ce weekend ?", "Ça te dit d'aller [au ciné / au resto / voir un concert] ?", "On se fait un ciné ? / On se fait une bouffe ? / On se fait un bowling ?", "Hésitez pas à dire non — c'est juste une idée.", "OK, c'est parti ! / Bon, c'est bon, on y va !", "Bonjour, vous avez une table pour [deux / quatre] ?", "Je vais prendre [l'entrée et le plat / le menu du jour / un steak-frites].", "Et pour vous ? / Et comme boisson ?", "On prend des trucs à partager ? / On partage quelques plats ?", "Vous pouvez nous apporter du pain, s'il vous plaît ?", "C'était délicieux ! Franchement, super bon.", "Je prends le dessert ? / Quelqu'un prend un dessert ?", "On fait moitié-moitié ? / On partage l'addition ? / Chacun paie ce qu'il a pris ?", "On va voir quoi ? / Ça passe où, ce film ?", "Je réserve deux places pour [le film / le concert]. / Il reste des places pour [ce soir] ?", "C'était comment ? / T'as aimé ?", "Le début était un peu long, mais après ça décolle.", "J'ai adoré ! / J'ai pas accroché, désolé.", "On se prend un verre après ? / On enchaîne sur un verre ?", "Franchement, j'ai trouvé ça génial / nul / bof.", "On fait un apéro ce soir ? / Apéro chez moi ?", "Santé ! / À ta santé ! / Tchin-tchin !", "Je prendrai bien un autre verre, et toi ?", "Allez, encore un petit pour la route ?", "Bon, on va y aller. Merci pour cette soirée, c'était trop sympa !"], "contexts": ["La question d'ouverture classique entre amis ou collègues proches. On la pose le jour même ou la veille. La réponse typique : *\"Rien de spécial, pourquoi ?\"* (traduction : \"je suis disponible, propose quelque chose\").", "LA formule magique pour proposer une sortie. *\"Ça te dit… ?\"* = littéralement \"does that say something to you?\" mais = \"are you up for…?\". C'est chaleureux, informel, et très naturel.", "La même vibe que *\"on se fait un café ?\"* du Mois 02, version loisirs. *\"On se fait un restau ce soir ?\"* / *\"On se fait une balade ?\"* C'est une proposition enthousiaste et engageante.", "Vous avez proposé un plan, mais vous sentez que le groupe n'est pas chaud. Cette phrase libère tout le monde : \"no pressure, on peut changer\". Très utile pour éviter le silence gêné qui suit une proposition pas folle.", "Le moment où le groupe se décide enfin. *\"OK, c'est parti\"* = on lance l'action. *\"Bon, c'est bon, on y va\"* = après 20 minutes de délibération, on tranche. La réponse collective : *\"Allez, on y va !\"*", "Vous arrivez au restaurant sans réservation (ou avec). La phrase d'ouverture standard. Le serveur répond : *\"Oui, suivez-moi\"* ou *\"Il faudra attendre un petit quart d'heure.\"*", "Au moment de commander. Le serveur a demandé *\"Vous avez choisi ?\"* (Mois 01, expression 3). Vous répondez par *\"Oui, je vais prendre…\"* ou *\"Je vais prendre ça, et lui, il va prendre…\"*", "Le serveur prend la commande du premier, puis se tourne vers le second. *\"Et pour vous ?\"* = \"and for you, sir/madam?\". Pour les boissons : *\"Et comme boisson ?*\" ou *\"Qu'est-ce que je vous sers à boire ?\"*", "Dans un restaurant \"à partage\" (mezzé, tapas, bistronomie). On décide en groupe de commander plusieurs plats et de tout mettre au milieu. *\"On prend trois entrées et deux plats, et on partage ?\"*", "Le pain n'est pas toujours apporté automatiquement (ça dépend du restaurant). Si la corbeille ne vient pas, on demande poliment. Le serveur répond : *\"Oui, tout de suite\"* ou *\"Je vous apporte ça.\"*", "À la fin du repas, quand le serveur demande *\"Ça a été ?\"* ou *\"Tout s'est bien passé ?\"*. C'est le moment de complimenter. *\"Franchement, super bon\"* est chaleureux sans être forcé.", "Après le plat principal. Le serveur va bientôt revenir. Le groupe hésite. *\"Je prends le dessert ?\"* (je pose ma propre intention, les autres peuvent suivre ou pas). *\"Quelqu'un prend un café ?\"* (idem).", "Le grand moment de vérité : l'addition arrive. En France, on ne se bat pas pour payer (comme dans les clichés). On propose : *\"On partage ?\"* ou *\"On fait moitié-moitié ?\"* (pour 2 personnes). Si les montants sont très différents : *\"Chacun paie ce qu'il a pris.\"*", "Vous êtes avec des amis et vous choisissez un film. *\"On va voir quoi ?\"* = \"what are we going to see?\" (décision collective). *\"Ça passe où ?\"* = \"where is it playing?\" (dans quel cinéma).", "En ligne, au guichet, ou au téléphone. *\"Je réserve deux places pour la séance de 20h\"* (au cinéma). *\"Il reste des places pour le concert de samedi ?\"* (on s'inquiète que ce soit complet).", "À la sortie du cinéma, du concert, du spectacle. La question qu'on se pose immédiatement. *\"Alors, c'était comment ?\"* ou *\"T'as aimé ?\"* avec intonation montante.", "Vous donnez votre avis nuancé sur un film/spectacle. La structure typique d'un commentaire français : positif + négatif + positif. *\"L'acteur est génial, mais l'histoire est tirée par les cheveux. Mais ça se laisse regarder.\"*", "Vous donnez votre verdict après une sortie culturelle. *\"J'ai adoré\"* = clairement positif. *\"J'ai pas accroché\"* = \"it didn't click with me\" (plus poli que \"je n'ai pas aimé\"). On peut ajouter *\"pourtant j'avais des attentes\"* pour adoucir.", "À la sortie du ciné/concert. Vous êtes chauds, l'ambiance est bonne. Quelqu'un propose de prolonger. *\"On se prend un verre après ?\"* = proposition standard. Si le groupe est unanime : *\"Allez, on enchaîne !\"*", "Le verdict final, sans filtre, entre amis proches. *\"génial\"* = super great. *\"nul\"* = terrible (très courant, pas grossier entre amis). *\"bof\"* = meh, la fameuse moue française.", "L'invitation à l'apéro est presque toujours spontanée. *\"On fait un apéro ?\"* = \"casual drinks at someone's place or a bar\". La réponse presque toujours oui : *\"Avec plaisir ! J'amène quoi ?\"* (on apporte toujours quelque chose).", "On lève son verre, on regarde la personne dans les yeux (important en France — ne pas regarder ailleurs = impoli). On dit *\"Santé !\"* (le plus courant), *\"À la tienne !\"* (tutoiement), ou *\"Tchin-tchin !\"* (plus ludique, un peu enfantin).", "L'apéro bat son plein, votre verre est vide. Vous proposez une tournée générale (ou juste pour vous deux). *\"Je prendrai bien un autre verre\"* = \"I wouldn't mind another drink\" (conditionnel = poli + envie personnelle).", "Le moment où tout le monde dit \"bon, je vais y aller\" mais personne ne bouge. Quelqu'un propose *\"un dernier ?\"* et tout le monde se rassied. Le *\"pour la route\"* = \"one for the road\". Rituel quasi obligatoire.", "La fin de la soirée. On se lève, on remercie l'hôte, on dit au revoir à tout le monde. *\"Merci pour cette soirée\"* + un compliment : *\"C'était génial\"* / *\"On a trop bien mangé\"* / *\"À refaire !\"*"]}, "4": {"theme": "Santé", "count": 25, "expressions": ["Bonjour, je voudrais prendre rendez-vous, s'il vous plaît.", "C'est pour une consultation. / C'est pour un renouvellement d'ordonnance.", "J'ai mal à [la tête / la gorge / au ventre / aux dents / au dos].", "J'ai de la fièvre. / Je tousse. / Je suis fatigué(e). / Je me sens pas bien.", "Est-ce que je peux voir un médecin rapidement ? / Vous avez un créneau aujourd'hui ?", "Bonjour docteur, je viens parce que [j'ai mal à la gorge / je suis fatigué / j'ai un truc qui me gratte].", "Depuis quand ? / Ça a commencé quand ? / Vous avez ça depuis quand ?", "Vous avez déjà eu ça ? / C'est la première fois ? / Vous avez des antécédents ?", "Je vais regarder / Je vais vous ausculter.", "Vous avez pris votre température ?", "Je vous prescris [un antibiotique / un sirop / des anti-inflammatoires]. / Je vais vous faire une ordonnance.", "C'est à prendre comment ? / À quel dosage ? / Combien de fois par jour ?", "Je reviens si ça ne passe pas ? / Si ça s'aggrave ?", "Bonjour, j'aurais besoin d'un conseil.", "Je cherche [un sirop pour la toux / des pastilles pour la gorge / de la crème pour les brûlures].", "C'est pour un enfant de [âge] ans. / C'est pour moi, un adulte.", "C'est remboursé ? / Est-ce que c'est remboursé par la Sécurité sociale ?", "Vous avez ça sans ordonnance ? / Est-ce que c'est délivré sans ordonnance ?", "Vous pouvez me donner la posologie, s'il vous plaît ?", "Je voudrais quelque chose de naturel, si possible. / Vous avez quelque chose en homéopathie ?", "Appelez une ambulance, s'il vous plaît ! / C'est une urgence !", "Je suis tombé(e) / Je me suis blessé(e) / Je me suis brûlé(e).", "J'ai mal ici. / C'est là que j'ai mal. / Là, exactement.", "On va vous faire une radio. / Il faut faire des analyses de sang. / Je vais vous prescrire un scanner.", "Je n'ai pas de mutuelle. / Vous pouvez passer ma carte Vitale ?"], "contexts": ["Au téléphone avec une secrétaire médicale ou à l'accueil d'un cabinet. On commence toujours par *\"Bonjour\"*, on décline son identité, puis on demande un rendez-vous. La secrétaire demande : *\"C'est pour quel motif ?\"* (= reason for the visit).", "La secrétaire vous demande *\"C'est pour quel motif ?\"* Vous répondez : *\"C'est pour une consultation\"* (général) ou *\"C'est pour un renouvellement d'ordonnance\"* (vous avez déjà un traitement, vous voulez qu'il le re-prescrive).", "La phrase de base pour décrire ce qui ne va pas. *\"J'ai mal à la gorge\"* (sore throat), *\"J'ai mal au ventre\"* (stomach ache), *\"J'ai mal à la tête\"* (headache). La structure est toujours : *\"J'ai mal à + [partie du corps]\"*.", "Vous décrivez votre état général. *\"J'ai de la fièvre\"* = I have a fever. *\"Je tousse\"* = I cough. *\"Je suis fatigué\"* = I'm tired. *\"Je me sens pas bien\"* = I don't feel well (la négation sans \"ne\" = parlée).", "Vous avez des symptômes qui ne peuvent pas attendre 3 jours. Vous appelez le cabinet. La secrétaire peut dire *\"Le médecin est complet aujourd'hui. Demain à 11h ?\"* — vous pouvez accepter ou demander un autre cabinet.", "Le médecin vous fait entrer, vous vous asseyez. Il commence par *\"Alors, qu'est-ce qui vous amène ?\"* ou *\"Racontez-moi.\"* Vous répondez par *\"Je viens parce que…\"* et vous décrivez brièvement vos symptômes.", "Le médecin vous posera TOUJOURS cette question. Comprenez-la ! La réponse : *\"Depuis [hier / lundi / trois jours]\"* ou *\"Ça a commencé [cette nuit / la semaine dernière].\"*", "Le médecin cherche à savoir si c'est récurrent. *\"Vous avez déjà eu des migraines ?\" / \"C'est la première fois que vous avez mal au dos comme ça ?\"* Vous répondez : *\"Oui, j'en ai déjà eu\"* ou *\"Non, c'est la première fois.\"*", "Le médecin sort son stéthoscope. Il va vous écouter. *\"Respirez. Ne respirez pas. Inspirez. Expirez.\"* Ces 4 ordres reviennent toujours. Entraînez-vous à les reconnaître pour ne pas paniquer.", "Le médecin vous pose des questions standard. *\"Vous avez pris votre température ?\" / \"Vous avez pris quelque chose pour la douleur ?\" / \"Vous avez des allergies ?\"* / \"Vous fumez ?\" / \"Vous buvez de l'alcool ?\"", "Le moment crucial : le médecin écrit l'ordonnance. Il vous dit ce qu'il vous prescrit. *\"Je vous prescris un antibiotique pendant 7 jours\"* / *\"Je vais vous faire une ordonnance pour des anti-inflammatoires.\"*", "Le médecin vous donne l'ordonnance. Vous avez le droit de poser des questions. *\"C'est à prendre comment ?\"* = how to take it. *\"Avant ou après le repas ?\"* = before or after meals? *\"Pendant combien de temps ?\"* = for how long?", "Avant de partir, vous vérifiez le plan B. *\"Je reviens si ça ne passe pas d'ici une semaine ?\"* Le médecin répond : *\"Oui, si dans 5 jours vous avez toujours mal, revenez.\"* ou *\"Si ça s'aggrave, allez aux urgences.\"*", "Vous ne savez pas exactement ce qu'il vous faut. La pharmacienne est formée pour vous guider. *\"J'aurais besoin d'un conseil, j'ai mal à la gorge\"* → elle vous posera des questions et vous recommandera un produit.", "Vous savez ce que vous voulez (ou le nom du médicament prescrit). *\"Bonjour, je cherche du Doliprane\"* (paracétamol français). La pharmacienne répond : *\"Vous voulez quoi comme dosage ? 500 ou 1000 ?\"*", "La pharmacienne a besoin de savoir l'âge pour adapter le dosage. *\"C'est pour un enfant de 3 ans\"* / *\"C'est pour moi\"* / *\"C'est pour ma mère, elle a 70 ans.\"*", "Certains médicaments sont remboursés (marqués d'un cercle vert ou d'un \"NR\" = non remboursé). La pharmacienne vous informe. *\"Celui-ci est remboursé à 65%.\"* Si vous avez une mutuelle (private insurance), le reste est souvent couvert.", "Vous cherchez un médicament que vous connaissez de votre pays. En France, beaucoup de médicaments courants sont en vente libre (sans ordonnance) : Doliprane, anti-inflammatoires locaux, sirops, antihistaminiques. Mais certains sont strictement sur ordonnance.", "La pharmacienne vous donne le médicament. Même si c'est écrit sur la boîte, demandez les instructions orales. Elle vous explique : *\"C'est un comprimé matin, midi et soir pendant 5 jours.\"* ou *\"Une application locale 3 fois par jour.\"*", "Beaucoup de Français préfèrent les remèdes naturels ou l'homéopathie pour les petits maux. Les pharmacies françaises ont un rayon \"naturel\" très fourni (phytothérapie, huiles essentielles, homéopathie). La pharmacienne peut vous conseiller.", "En cas d'urgence absolue. Le numéro d'urgence en France : **15** (SAMU = ambulance médicalisée), **17** (police), **18** (pompiers), **112** (numéro européen). Si vous appelez le 15, dites : *\"Bonjour, j'ai besoin d'une ambulance. / Il y a un blessé grave.\"*", "Vous arrivez aux urgences ou vous appelez. *\"Je suis tombé dans les escaliers\"* / *\"Je me suis coupé avec un couteau\"* / *\"Je me suis brûlé la main.\"* La structure : *\"Je me suis + participe passé\"* pour les actions qu'on a faites à soi-même.", "Aux urgences, le médecin ou l'infirmier vous palpe (examine par le toucher). *\"Là ? Ici ?\"* Il appuie à différents endroits. Vous répondez *\"Oui, là !\"* ou *\"Non, un peu plus à droite.\"*", "Le médecin décide qu'il faut investiguer. *\"une radio\"* = X-ray. *\"des analyses de sang\"* = blood tests. *\"un scanner\"* = CT scan. *\"une IRM\"* = MRI. Comprendre ces mots peut réduire votre stress de 80%.", "À l'accueil de l'hôpital ou à la pharmacie. On vous demandera votre **carte Vitale** (carte verte d'assurance maladie française). Si vous n'en avez pas (touriste, nouvel arrivant), vous paierez et serez remboursé plus tard. *\"Je n'ai pas de carte Vitale encore, je viens d'arriver.\"*"]}, "5": {"theme": "Au téléphone", "count": 25, "expressions": ["Allô ?", "C'est Caroline à l'appareil.", "Ne quittez pas, je vous le passe.", "Je peux vous laisser un message ?", "Rappelez-moi dès que possible.", "Vous êtes bien sur le répondeur de Caroline.", "C'est Caroline. Je vous appelle pour vous parler de la réunion de demain.", "Je vous rappellerai plus tard, merci. Au revoir.", "Prenez un message, je vous prie.", "Vous pouvez lui dire que j'ai appelé ?", "Dites-lui que je passerai en fin de journée.", "Il n'est pas là, vous voulez laisser un message ?", "Je lui dirai que vous avez appelé.", "T'es où ?", "OK. À toute !", "Je suis en retard, désolé ! J'arrive.", "Tu fais quoi ? — Pas grand-chose, et toi ?", "Mdr", "T'as vu son message ?", "Je t'envoie le lien tout de suite.", "Je vous entends mal, vous pouvez répéter ?", "Vous êtes en muet.", "Je partage mon écran, vous voyez ?", "On va commencer, vous êtes tous là ?", "On se voit la semaine prochaine, même heure ?"], "contexts": ["Vous décrochez. Point barre. C'est le mot le plus efficace du français téléphonique. Pas de sourire forcé — juste *\"Allô ?\"* avec l'intonation montante.", "Vous appelez quelqu'un. La personne décroche. Vous donnez votre prénom immédiatement. *\"Allô, bonjour, c'est Caroline à l'appareil.\"* C'est la formule standard.", "Vous appelez une entreprise, on vous met en relation. Ou quelqu'un vous appelle chez vous et demande votre conjoint·e. *\"Ne quittez pas\"* = musique d'attente en approche.", "La personne que vous voulez n'est pas là. Vous demandez si vous pouvez laisser un message à la personne qui a décroché. C'est poli, c'est clair.", "Sur un répondeur ou à la fin d'un message. Vous voulez qu'on vous rappelle. *\"Dès que possible\"* = ASAP à la française.", "C'est ce que vous entendez quand la personne ne décroche pas. La voix standard du répondeur. Puis — BIP — c'est à vous.", "Après le bip. Vous vous présentez, vous donnez le motif de l'appel. Structure idéale : nom + sujet + fin polie.", "Vous avez raté la personne. Vous ne voulez pas laisser un message long. Cette phrase est polie, ferme, et termine l'appel proprement.", "Version polie pour quand on répond au téléphone pour quelqu'un d'autre. Pas très courant aujourd'hui mais reste une marque de grande politesse.", "La secrétaire, un collègue, votre belle-mère décroche. Vous voulez juste qu'on sache que vous avez appelé. C'est la formule la plus naturelle.", "Vous voulez qu'on transmette une information plus précise. *\"passerai\"* peut signifier passer au téléphone ou passer physiquement — le contexte fait la différence.", "Vous répondez au téléphone pour quelqu'un d'autre. C'est la phrase à dire au lieu de paniquer et de passer l'appareil à côté.", "Le récepteur prend note. C'est la fin polie de l'interaction téléphonique indirecte. Vous pouvez raccrocher tranquille.", "Le texto le plus fréquent de France. *\"T'es où ?\"* = \"Where are you?\" en version SMS. Court, efficace, immédiat.", "Vous finissez une conversation WhatsApp. Vous confirmez un truc. *\"OK\"* + *\"à toute\"* = version courte de *\"à tout à l'heure\"* (dans la même journée).", "Le texto de secours universel. Vous êtes en retard à un rendez-vous, un dîner, un cours. Vous prévenez — c'est la politesse minimum en France.", "L'ouverture de conversation par texto la plus banale, la plus française. C'est le *\"wyd\"* français. La réponse standard est *\"Pas grand-chose\"* (même si vous faites trois choses à la fois).", "Dans un texto ou un WhatsApp. *\"Mdr\"* = l'équivalent français de \"lol\". *\"Ptdr\"* = plus fort que *\"mdr\"*. On peut aussi dire *\"je suis mort\"* ou *\"je pleure\"* (ça = \"I'm crying\" = rire).", "Vous parlez d'un message reçu dans un groupe WhatsApp ou en privé. *\"T'as vu ?\"* = le réflexe de vérification collective.", "Dans une conversation WhatsApp. Vous promettez d'envoyer un document, une photo, une adresse. *\"tout de suite\"* = immédiatement.", "La phrase n°1 en visio. Micro qui coupe, connexion pourrie, enfant qui pleure en arrière-plan. C'est la phrase de survie.", "Vous parlez mais personne ne vous entend. Ou quelqu'un parle sans qu'on l'entende. La notification la plus répétée des réunions Zoom en France.", "Avant de commencer une présentation en visio. On vérifie que tout le monde voit le même écran. *\"Vous voyez ?\"* = petite confirmation polie.", "Le début de la réunion. L'hôte attend que les retardataires arrivent, puis lance. *\"Vous êtes tous là ?\"* = check final avant de démarrer.", "La fin de la réunion. Tout le monde commence à se déconnecter. On confirme le prochain rendez-vous rapidement, sans formalité."]}, "6": {"theme": "A table", "count": 25, "expressions": ["Bonsoir ! Désolé du retard, les enfants...", "Qu'est-ce que je peux apporter ?", "Tenez, c'est pour vous !", "Oh, il ne fallait pas !", "Fais comme chez toi !", "C'est délicieux ! C'est vous qui avez fait ?", "Vous pouvez me passer le pain, s'il vous plaît ?", "Servez-vous, ne faites pas de façons !", "Je veux bien un peu plus, c'était tellement bon.", "Non merci, j'ai très bien mangé. C'était copieux !", "C'est quoi comme plat ? Ça sent bon.", "Il y a du pain ?", "À ta santé ! / Santé !", "Rouge ou blanc ?", "Vous vous y connaissez en vin ? Qu'est-ce que vous me conseillez ?", "Il est bon, ce vin. Il vient d'où ?", "Je peux goûter ?", "Sans alcool pour moi, merci.", "Un petit verre de rouge ? — Allez, un petit !", "C'est un peu tannique.", "On va y aller, il se fait tard.", "Merci infiniment pour cette superbe soirée.", "Tu veux que je t'aide à débarrasser ?", "Tu veux emporter les restes ?", "À bientôt j'espère ! On se tient au courant ?"], "contexts": ["Vous arrivez à un dîner. La porte s'ouvre. Vous dites *\"bonsoir\"* à l'hôte, *\"désolé du retard\"* (même si vous êtes à l'heure — c'est poli d'être modeste sur la ponctualité).", "Avant le dîner, quand on vous invite. Proposer quelque chose (vin, dessert, boisson) est obligatoire. L'hôte dira *\"Non non, rien du tout !\"* — mais vous apportez quand même un petit quelque chose.", "Vous tendez votre cadeau (vin, fleurs, chocolats) à l'hôte en entrant. *\"Tenez\"* = \"Here, take it\" en version polie. On le dit en tendant l'objet, pas avant.", "L'hôte reçoit votre cadeau. C'est la réponse obligatoire — même si l'hôte avait secrètement espéré du vin. Ça veut dire \"merci, c'est trop gentil, mais ce n'était pas nécessaire\".", "L'hôte vous accueille et vous donne la permission d'être à l'aise. Ça signifie : \"tu peux te servir, aller aux toilettes, te lever, regarder dans le frigo (si t'es très proche)\".", "La première bouchée. Vous goûtez. C'est bon. Vous dites quelque chose. *\"C'est délicieux\"* = le compliment standard. La question montre que vous êtes intéressé par le plat.", "À table, quelque chose est hors de portée. Vous demandez à la personne à côté. C'est la formule de courtoisie de base.", "L'hôte vous encourage à vous servir. *\"faire des façons\"* = faire des manières, hésiter, refuser poliment avant d'accepter. L'hôte vous donne la permission directe.", "Vous avez aimé. Vous voulez vous resservir. C'est le plus beau compliment que vous puissiez faire à un hôte français. *\"Je veux bien\"* = forme polie de \"j'aimerais\".", "L'hôte propose du fromage, du dessert, une autre part. Vous êtes rassasié. Refuser sans vexer demande une formule polie. *\"copieux\"* = généreux, abondant = compliment indirect.", "Le plat arrive de la cuisine. Vous ne savez pas ce que c'est. Vous montrez de l'intérêt. *\"Ça sent bon\"* = compliment olfactif avant même de goûter.", "À table, le pain est un élément essentiel du repas français. Si le pain manque, c'est une urgence sociale — on en demande poliment. *\"Tu peux couper du pain ?\"* si vous demandez à un proche.", "Levez votre verre, regardez la personne dans les yeux, trinquez. *\"Santé !\"* = la version courte universelle. *\"Tchin-tchin !\"* = plus familier.", "L'hôte vous propose du vin. La question la plus simple du monde. On peut répondre *\"Rouge, merci\"* ou *\"Blanc, volontiers\"* ou *\"Les deux ?\"* (pour être drôle).", "Vous êtes chez un caviste, au restaurant, ou chez des amis qui ont une cave. Vous reconnaissez l'expertise de l'autre. La question valorise la personne.", "Vous goûtez le vin. Vous complimentez. Vous montrez de l'intérêt. La question sur l'origine est la plus naturelle — en France, le vin est une question de terroir.", "Avant de servir tout le monde, on peut demander à goûter le vin. À la maison, l'hôte peut proposer : *\"Tu veux goûter ?\"* Au restaurant, le sommelier verse une petite quantité pour que vous approuviez.", "Vous ne buvez pas d'alcool. En France, c'est socialement accepté (moins qu'ailleurs, mais de plus en plus). La formule courte et ferme est respectée.", "La fin du repas approche. Quelqu'un propose un dernier verre. La réponse *\"Allez, un petit !\"* = \"Oh go on then, just a small one\" — c'est presque toujours accepté.", "Vous commentez le vin. Même un niveau basique de vocabulaire du vin impressionne les Français. *\"fruité\"* (fruity), *\"sec\"* (dry), *\"tannique\"* (tannic), *\"corsé\"* (full-bodied) sont les mots de base.", "Le signal de départ. On ne se lève pas brusquement. On annonce doucement. *\"Il se fait tard\"* = excuse universelle. L'hôte protestera : *\"Déjà ?! Restez encore un peu !\"*", "Au moment de partir. Vous remerciez l'hôte chaleureusement. C'est le moment le plus important de la soirée — le dernier souvenir que l'hôte garde de vous.", "Après le repas, avant de partir ou pendant la soirée. Proposer de l'aide est un signe de bonne éducation. L'hôte refusera (sauf si c'est un ami très proche).", "Fin de soirée. L'hôte propose d'emballer ce qui reste. En France, c'est devenu normal (surtout chez les jeunes). On répond : *\"Oh, avec plaisir !\"* ou *\"Non merci, gardez-les.\"*", "La dernière phrase sur le pas de la porte. La promesse de se revoir. *\"On se tient au courant\"* = we keep each other updated, on organise la prochaine fois."]}, "7": {"theme": "Transports", "count": 25, "expressions": ["Je voudrais un billet pour Lyon, s'il vous plaît.", "C'est bien le quai 5 pour le train de 14h38 ?", "Le train a combien de retard ?", "Je dois changer à quelle gare ?", "Je peux prendre le train suivant avec ce billet ?", "Un carnet de tickets, s'il vous plaît.", "C'est quelle direction pour aller à Montparnasse ?", "Vous savez où je dois descendre pour le Louvre ?", "Le prochain métro passe dans combien de temps ?", "Vous compostez avant de monter.", "C'est bien le bus 68 ?", "Je voudrais un ticket pour deux zones, s'il vous plaît.", "Je valide avec ma carte bancaire, ça marche ?", "Vous êtes libre ?", "Je vais à l'aéroport Charles-de-Gaulle.", "Vous pouvez me prendre au 15 rue de Rivoli ?", "On partage la course ?", "Vous pouvez mettre le compteur ?", "Je peux payer par carte ?", "Vous pouvez me déposer ici, c'est bon !", "Le plein, s'il vous plaît !", "C'est tout droit, puis à droite.", "Le péage, c'est combien ?", "Où est-ce qu'on peut se garer ici ?", "On fait une pause — t'as besoin de conduire ?"], "contexts": ["Au guichet de la gare ou à la borne automatique (en vrai, on dit ça à l'agent). Précisez si vous voulez aller simple (*aller simple*) ou aller-retour (*aller-retour*).", "Vous êtes sur le quai. Vous vérifiez avant de monter. *\"C'est bien… ?\"* = \"Just to confirm, this is… ?\" C'est plus poli qu'une question directe.", "Vous regardez le panneau d'affichage. Le train est annoncé avec du retard. Vous demandez à un contrôleur ou à un autre voyageur.", "Vous avez une correspondance. Vous vérifiez où changer. *\"changer\"* (de train) = to change. *\"Correspondance\"* = connection (écrit sur les panneaux).", "Vous avez raté votre train. Ou votre train est annulé. Vous demandez si votre billet est valable pour le suivant. Ça dépend du type de billet.", "Au guichet du métro ou à la borne. *\"Un carnet\"* = 10 tickets (dans la plupart des villes). Moins cher que d'acheter des tickets à l'unité.", "Vous êtes sur le quai du métro. Vous ne savez pas dans quel sens prendre la rame. Vous demandez à un voyageur ou au plan.", "Dans le bus ou le métro. Vous n'êtes pas sûr de votre arrêt. Vous demandez à un passager. C'est plus naturel que de fixer son téléphone.", "Sur le quai. Vous regardez le panneau d'affichage. Parfois il est en panne. Vous demandez à quelqu'un.", "Ce que dit le contrôleur ou le panneau. *\"Compostez votre billet avant de monter dans le train\"* = tamponnez le billet avec la borne jaune/verte.", "Devant un bus qui arrive. Vous n'êtes pas sûr. Vous demandez au conducteur ou à un passager avant de monter. Toujours plus sage que de monter et vérifier après.", "Dans les transports régionaux (RER, Transilien, TER), le prix dépend du nombre de zones traversées. Précisez toujours le nombre de zones.", "Dans le métro, de plus en plus de villes (Paris, Lyon, Marseille) acceptent le paiement sans contact par CB. Vous demandez si c'est disponible.", "Vous voyez un taxi (stationné ou qui passe). Vous lui faites signe. La question rituelle. Si oui, il s'arrête. Si non, il fait non de la tête ou continue.", "Vous montez dans le taxi. Vous donnez votre destination directement. Si c'est une adresse précise, donnez-la. *\"Au 15 rue de Rivoli, s'il vous plaît.\"*", "Vous commandez un Uber ou un taxi. Vous donnez l'adresse exacte de prise en charge. *\"me prendre\"* = come and get me.", "Vous prenez un Uber avec un ami. Vous vous mettez d'accord sur le paiement. *\"La course\"* = the ride (pas seulement la compétition !).", "Dans un taxi traditionnel (pas Uber). Vous voulez vous assurer que le chauffeur enclenche le compteur. C'est la règle — ils le font automatiquement, mais vous pouvez le dire en montant.", "Fin de la course. Vous voulez payer. En France, la plupart des taxis acceptent la carte (depuis 2015, c'est obligatoire). Mais certains chauffeurs \"oublient\" le terminal.", "Vous arrivez à destination. Vous indiquez au chauffeur où vous arrêter. *\"C'est bon\"* = \"that's fine / this is good\" — signale que vous êtes arrivé.", "À la station-service. Vous vous arrêtez à la pombe (ou au service si pompiste). *\"Le plein\"* = fill it up. Vous pouvez préciser le type de carburant : *\"Sans plomb 95\"* ou *\"Diesel\"*.", "Le passager lit le GPS ou donne les directions. *\"C'est tout droit, tu tournes à droite après le feu, et là c'est la troisième à gauche.\"*", "Vous approchez d'un péage d'autoroute. *\"Le péage\"* = the toll booth / toll fee. La phrase peut s'adresser au passager ou à vous-même en regardant le panneau des prix.", "Vous arrivez en ville. Vous cherchez une place. C'est la question la plus fréquente du conducteur en France. *\"se garer\"* = to park oneself.", "Sur un long trajet en voiture. Le conducteur fatigue. *\"T'as besoin de conduire ?\"* = tu veux prendre le volant ? / tu as besoin de conduire à mon tour ?"]}, "8": {"theme": "Admin", "count": 25, "expressions": ["Je voudrais ouvrir un compte bancaire.", "Je peux avoir une carte bleue ? C'est combien par an ?", "J'ai perdu ma carte. Je fais opposition ?", "Je voudrais faire un virement vers ce compte.", "Je peux retirer de l'argent au distributeur ?", "Je voudrais envoyer ce colis aux États-Unis.", "Je voudrais un timbre pour l'étranger, s'il vous plaît.", "Avec suivi, s'il vous plaît.", "Je voudrais envoyer une lettre recommandée.", "C'est à quel nom ?", "Je peux retirer un colis ? J'ai l'avis de passage.", "Je peux le faire envoyer chez un point relais ?", "C'est combien pour un timbre et un recommandé avec AR ?", "Je voudrais prendre un rendez-vous pour une carte d'identité.", "J'ai besoin d'un extrait d'acte de naissance.", "Quels sont les justificatifs à fournir ?", "J'ai un rendez-vous à 10h avec Madame Dupont.", "J'ai perdu mes papiers. Comment je fais pour les refaire ?", "J'habite ici depuis deux ans.", "Je peux faire la demande en ligne ou il faut venir en personne ?", "Bonjour, excusez-moi de vous déranger…", "J'arrive pas à comprendre — vous pouvez m'expliquer ?", "J'ai toutes les pièces normalement — vous pouvez vérifier ?", "Je reviens tout à l'heure avec le document manquant.", "Merci beaucoup, bonne journée !"], "contexts": ["Au guichet de la banque ou en rendez-vous avec un conseiller. C'est la phrase de base. Le conseiller vous demandera des pièces : passeport, justificatif de domicile, visa/titre.", "Après avoir ouvert un compte. Vous demandez la carte bancaire. En France, la carte a un coût annuel (entre 30 et 150 € selon le type). Demandez le prix avant d'accepter.", "Urgence bancaire. Vous avez perdu votre carte (ou on vous l'a volée). Vous appelez la banque. *\"Faire opposition\"* = signaler la perte/vol pour bloquer la carte.", "Vous devez transférer de l'argent. À la banque (si vous ne le faites pas en ligne). *\"Virement\"* = wire transfer. *\"Virement SEPA\"* = European transfer. *\"IBAN\"* = le numéro de compte international (France : 27 caractères).", "Vous voulez savoir si votre carte fonctionne dans un DAB (Distributeur Automatique de Billets). Question de base quand on ouvre un compte.", "Vous avez un colis. Vous allez à La Poste. Vous le posez sur le comptoir. *\"Je voudrais envoyer ce colis à l'international.\"*", "Vous devez poster une lettre ou une carte postale. *\"Un timbre pour la France\"* = timbre vert (le moins cher). *\"Pour l'étranger\"* = timbre plus cher (Europe, monde).", "Vous envoyez un colis ou une lettre importante. Vous demandez le service de suivi. *\"Avec suivi\"* = tracking included. La réponse de l'agent : *\"Ça coûte 2€ de plus.\"*", "En France, on envoie des lettres recommandées pour tout ce qui est officiel : résiliation, contrat, réclamation. Le facteur fait signer un accusé de réception (AR).", "Vous récupérez un colis à La Poste (avis de passage). L'agent vous demande l'identité du destinataire. *\"À quel nom ?\"* + papier d'identité.", "Vous avez un papier jaune dans votre boîte aux lettres : le facteur a essayé de livrer, vous n'étiez pas là. Vous allez récupérer le colis au bureau de poste.", "Vous ne voulez pas que le colis arrive chez vous. Vous préférez le récupérer dans un commerce partenaire (tabac, épicerie). Très courant en France.", "Vous voulez comparer les prix. L'agent peut vous donner le tarif de plusieurs options. Utile si vous n'êtes pas sûr du service dont vous avez besoin.", "À la mairie. Depuis 2020, presque toutes les demandes de passeport et CNI se font sur rendez-vous. Parfois en ligne, parfois par téléphone ou à l'accueil.", "Vous avez besoin de ce document pour une démarche administrative (passeport, mariage, naturalisation). À demander au service état civil de la mairie de votre lieu de naissance.", "À la mairie, à la banque, à la préfecture — partout où vous devez fournir des documents. C'est la question la plus utile de l'administration française.", "Vous arrivez à l'accueil de la mairie (ou autre administration). Vous annoncez votre rendez-vous. L'agent vérifie et vous indique où aller.", "Urgence administrative. Vous avez perdu vos documents (carte d'identité, passeport, titre de séjour). La mairie vous guide sur la procédure (déclaration de perte, renouvellement).", "La question standard des administrations : preuve de domicile, attestation, recensement. *\"Votre adresse ?\"* = votre lieu de résidence. *\"Votre adresse mail ?\"* = votre email.", "Avant de faire la queue, demandez si la démarche est disponible en ligne. De plus en plus de services (cartes grises, passeports, inscriptions) se font sur Internet.", "Vous arrivez à un guichet ou à un comptoir. L'agent ne vous a pas vu arriver. Cette phrase + sourire = 80 % de la politesse de faite.", "L'agent vous a donné des instructions compliquées. Vous ne comprenez pas. Cette phrase est humble, pas agressive. L'agent va reformuler.", "Vous tendez votre dossier à l'agent. Vous êtes (presque) sûr d'avoir tout ce qu'il faut. *\"Normalement\"* = votre petite protection si vous avez oublié quelque chose.", "Il manque un papier. L'agent vous le dit. Au lieu de vous énerver, vous dites cette phrase. L'agent appréciera votre calme.", "La fin de toute interaction administrative en France. Vous avez été servi, ou pas, mais vous remerciez et souhaitez une bonne journée. Ça change tout pour l'agent suivant."]}, "9": {"theme": "Logement", "count": 25, "expressions": ["Bonjour, je viens visiter l'appartement, c'est pour l'annonce sur Le Bon Coin.", "C'est quoi les charges ? Et l'eau, elle est comprise ?", "On fait l'état des lieux d'entrée quand ? Et on signe le bail le même jour ?", "Est-ce que le gaz a été vérifié récemment ? Et l'électricité ?", "Je peux avoir les clés un peu avant ? J'ai besoin d'emménager le week-end prochain.", "Il y a une fuite sous l'évier, ça coule partout — est-ce que vous pouvez envoyer quelqu'un ?", "Le chauffage ne marche plus depuis hier. Il fait 15 degrés dans l'appartement.", "Les plombs ont sauté. J'ai tout essayé, je n'ai plus de courant.", "La chasse d'eau est cassée — l'eau coule en continu, je dois fermer le robinet d'arrêt.", "D'accord, merci. Et quand est-ce que le réparateur peut passer ? Je suis là toute la journée — vous avez une tranche horaire ?", "Est-ce que c'est urgent ? Parce que si ça peut attendre la semaine prochaine…", "Je n'ai plus d'eau chaude. Le chauffe-eau est en panne, je crois.", "Les toilettes sont bouchées, j'ai essayé la ventouse mais ça n'a pas marché.", "Excusez-moi, je suis votre voisin du dessous — vous pouvez baisser un peu la musique ? C'est un peu fort.", "Bonjour, excusez-moi — vous avez reçu mon colis par erreur ? J'attends un paquet et le livreur s'est peut-être trompé d'étage.", "Ça vous embête si je fume sur le balcon de temps en temps ? Je peux fermer la porte, hein.", "Je peux vous laisser un double des clés ? Au cas où je m'enferme dehors — ça m'arrive tout le temps.", "Bonjour, je suis votre voisin du 3e — on a un problème avec la porte d'entrée, la serrure coince, vous avez déjà vu ça ?", "Bonjour, vous savez jusqu'à quand durent les travaux ? C'est un peu compliqué pour le télétravail.", "Merci pour votre discrétion — j'ai eu des invités hier soir, j'espère qu'on n'a pas fait trop de bruit.", "Bonjour, je vous écris pour vous informer que je vais quitter l'appartement dans deux mois. Je fais mon préavis à partir d'aujourd'hui.", "Je voulais vous demander : est-ce que je peux repeindre les murs avant de partir ? Je les remettrais en blanc si vous voulez.", "On fait l'état des lieux de sortie le 30 ? Je rends les clés ce jour-là.", "L'état des lieux est fait. Vous remboursez la caution sous combien de temps ?", "Merci pour tout — je suis bien content d'avoir habité ici. Si vous avez besoin de quelque chose, je suis encore en ville."], "contexts": ["Vous arrivez devant l'immeuble, le propriétaire ou l'agent ouvre la porte. La première phrase de la relation. Le *\"Bonjour\"* est obligatoire avant tout.", "Pendant la visite, vous regardez autour de vous. C'est la question la plus importante après le loyer. Les charges (eau, chauffage, entretien) peuvent doubler la facture.", "Vous avez été accepté·e. Félicitations. Maintenant, vous devez sécuriser la date de l'état des lieux d'entrée — le document qui protège votre caution au départ.", "En France, le propriétaire doit fournir un diagnostic gaz et électricité de moins de 3 ans. C'est une question de sécurité ET de droit.", "Le casse-tête de l'emménagement : vous devez quitter votre ancien logement un 30 et le nouveau est disponible un 1er. Demander un créneau de grâce est très courant.", "Urgence modérée-critique. Vous appelez le propriétaire ou le plombier. Le premier mot qui doit sortir = *\"fuite\"*. Le second = *\"urgence\"* si l'eau menace le sol.", "En hiver, c'est une urgence. En France, le propriétaire est tenu d'assurer un logement décent (chauffage fonctionnel). Mentionnez la température — ça donne un degré d'urgence très clair.", "Vous branchez le grille-pain, le four et le radiateur en même temps. *Pouf !* Plus rien. Vous cherchez le disjoncteur dans le noir.", "Classique des locations — le mécanisme de la chasse s'use, l'eau coule sans arrêt. Vous fermez le petit robinet sous le réservoir et vous appelez.", "Vous avez signalé le problème. Maintenant, vous devez caler un créneau. En France, on demande une *\"tranche horaire\"* (2h-4h) plutôt qu'une heure précise.", "Le propriétaire vous pose la question (ou vous la posez à vous-même). En France, une fuite lente peut attendre 48h. Un chauffage en hiver = urgence vraie.", "Problème classique. Soit le chauffe-eau électrique a disjoncté, soit le ballon d'eau chaude est vide (vous avez pris trois douches à la suite). Vérifiez le tableau électrique avant d'appeler.", "Situation délicate. Vous devez expliquer le problème sans être trop graphique. *\"Les toilettes sont bouchées\"* = la formule standard, neutre, professionnelle.", "Un samedi soir, 23h, le voisin fait la fête. Vous sonnez, sourire gêné. Le rituel : d'abord vous vous excusez de déranger, puis vous formulez la demande.", "Scénario récurrent dans les immeubles français : le livreur dépose le colis chez le mauvais voisin. Vous devez le récupérer sans passer pour un accusateur.", "Vous emménagez, vous fumez (ou le voisin fume et ça vous gêne). Le balcon est une zone grise : la fumée peut monter chez les voisins du dessus.", "Avec le voisin de palier, après quelques semaines de bons rapports. C'est une offre de confiance réciproque — un pas dans la relation.", "Problème collectif dans l'immeuble. Vous sonnez chez les voisins pour les alerter. La porte de l'immeuble ne ferme plus, la serrure est dure, le digicode est mort.", "Un voisin fait des travaux. Perceuse, marteau, meuleuse depuis 8h du matin. En France, les travaux sont autorisés en semaine (8h-12h / 14h-17h ou 19h selon les immeubles).", "Le lendemain d'une soirée. Vous croisez le voisin dans l'ascenseur. Le rituel français : un petit mot, un sourire, et la relation est préservée.", "Vous devez donner votre préavis (généralement 1 ou 3 mois selon la zone). En France, ça se fait par lettre recommandée ou par email avec accusé de réception.", "Vous avez vécu deux ans dans l'appartement. Les murs sont dans un état douteux. Vous proposez de repeindre pour éviter une retenue sur la caution.", "Vous coordonnez avec le propriétaire ou l'agence. L'état des lieux de sortie est un moment STRESSANT. Le moindre défaut non noté à l'entrée peut coûter cher.", "Fin de l'état des lieux. En France, le propriétaire a 1 mois (si pas de retenue) ou 2 mois (si retenue) pour rembourser le dépôt de garantie.", "Le dernier jour. Vous rendez les clés. Une relation de douze mois (ou plus) se termine. Ce petit mot laisse une impression positive et peut aider pour les références."]}, "10": {"theme": "Shopping", "count": 25, "expressions": ["Vous faites quelle taille ?", "Je peux essayer ?", "Vous avez la même chose en rouge ? Ou dans une taille au-dessus ?", "Ça me va ?", "Je le prends.", "C'est en soldes ?", "Regarde — il y a -30 % sur les manteaux. Et -20 % sur les chaussures.", "Vous faites une remise si j'en prends plusieurs ? Par exemple, les deux pulls et l'écharpe.", "C'est le dernier prix ?", "Les soldes commencent quand ? C'est le même jour partout ?", "Attends, c'est moins cher sur Internet — je regarde sur mon téléphone.", "La taille au-dessus, vous l'avez ? Ou la taille en dessous ?", "Je cherche un cadeau pour une amie — elle aime les choses simples, vous voyez le genre ?", "Bonjour, je voudrais retourner cet article. Je l'ai acheté hier et finalement il ne me va pas.", "Je peux échanger contre une autre taille ? J'ai pris du 38 mais il est trop petit.", "Je voudrais être remboursé, s'il vous plaît. L'article est défectueux.", "J'ai perdu le ticket de caisse — est-ce que vous pouvez retrouver la commande sur mon compte client ?", "L'article est défectueux — il y a une couture qui se défait, regardez.", "C'est pour offrir — vous pouvez faire un paquet-cadeau ?", "Vous livrez en point relais ? Parce que je ne suis pas chez moi la journée.", "Je valide le panier — et je choisis livraison à domicile.", "Bonjour, j'ai passé commande la semaine dernière et je n'ai rien reçu. Vous pouvez vérifier le statut ?", "Le colis est en retard — c'était prévu hier et je n'ai pas eu de notification.", "Je peux modifier l'adresse ]}, "11": {"theme": "Fetes", "count": 25, "expressions": ["Joyeux anniversaire !", "C'est pour toi — je t'ai pris un petit truc, j'espère que ça va te plaire.", "Tu as quel âge ?", "Je t'ai fait un gâteau — c'est ma recette secrète, tu me diras si c'est bon.", "Tous mes vœux pour ton anniversaire !", "Joyeux Noël !", "On se fait un réveillon cette année ? On fait ça chez nous, chacun amène un truc.", "Le 24, on a mangé du foie gras, de la dinde aux marrons, et de la bûche au chocolat — j'ai explosé.", "Bonne année ! Meilleurs vœux ! Et surtout une bonne santé !", "On tire les rois ! Qui a la fève ?", "Tu as eu quoi, pour Noël ? De beaux cadeaux ?", "Le Père Noël est passé cette nuit — regarde ce qu'il m'a apporté !", "Allez, on se fait la bise — bonne année et bonne santé !", "Félicitations ! Tous mes vœux de bonheur !", "Tu es magnifique ! / Tu es superbe !", "Allez, on trinque ! À la vôtre ! / À la tienne !", "Tu viens au mariage ? Tu t'habilles comment ? Moi je n'ai aucune idée de ce qu'il faut mettre.", "Le petit a été baptisé dimanche — y a eu un déjeuner de famille après, c'était très sympa.", "Le repas était incroyable — merci pour tout, vraiment. Vous vous êtes surpassés !", "La soirée était géniale — on a dansé jusqu'à 4h du matin, j'ai les pieds en compote.", "Merci pour le cadeau — c'est trop gentil ! Mais il ne fallait pas !", "Je vous souhaite une très bonne année, à vous et à votre famille.", "Merci pour l'invitation — c'était parfait, on a passé une super soirée.", "Je vous envoie une petite carte pour vous remercier de votre accueil — c'était vraiment charmant.", "Encore merci pour tout — et on se revoit bientôt, j'espère !"], "contexts": ["Vous entrez dans le bureau / la maison / le salon. La personne fête son anniversaire. C'est la première chose à dire. Avant le cadeau, avant la bise.", "Vous tendez le cadeau. La personne va l'ouvrir. La formule française consiste à **minimiser** le cadeau, quelle que soit sa valeur. C'est l'inverse de la culture US (\"look what I got you!\").", "Question rituelle du jour d'anniversaire. En France, l'âge n'est pas tabou entre amis (moins qu'aux US). On peut demander en rigolant.", "Anniversaire entre amis ou en famille. Le gâteau maison est LE symbole de l'attention personnelle. Même réussi, on le présente modestement.", "Vous écrivez une carte d'anniversaire. En France, on écrit toujours *\"Tous mes vœux\"* suivi d'une formule personnalisée. *\"Meilleurs vœux\"* = plus formel.", "La veille de Noël, le jour de Noël, dans la rue, au bureau, en famille. C'est la formule universelle du 24 décembre au 25.", "Le réveillon du 24 décembre (Noël) ou du 31 décembre (Saint-Sylvestre). Les Français organisent le réveillon des semaines à l'avance.", "Le lendemain de Noël, on raconte son repas. Le menu canonique : apéritif, foie gras, huîtres (optionnel), dinde aux marrons, fromages, bûche.", "Minute zéro du Nouvel An. On s'embrasse, on se souhaite la bonne année. La santé est LE souhait le plus important en France.", "Le 6 janvier (Épiphanie) et tout le mois qui suit. On achète une *\"galette des rois\"* (pâte feuilletée à la frangipane). Celui qui trouve la fève (petite figurine) devient roi/reine.", "Entre amis, au bureau, au retour des vacances de Noël. Tout le monde raconte ses cadeaux. C'est un sujet de conversation très courant.", "Le matin du 25 décembre, les enfants (et les adultes) découvrent les cadeaux sous le sapin. La formule est toujours la même.", "À minuit, le 1er janvier. En France, la bise est le rituel : on embrasse sur les deux joues (ou trois ou quatre selon la région). En même temps, on dit *\"bonne année\"*.", "Vous apprenez que des amis se marient / se pacsent. La formule est plus élaborée que pour une réussite professionnelle.", "Vous voyez le marié ou la mariée pour la première fois en tenue. C'est LE compliment à faire. Même si c'est évident, il faut le dire.", "Pendant le repas de fête, avant de boire. Il est IMPOLI de boire avant d'avoir trinqué avec tout le monde. Et il est impoli de ne pas regarder la personne dans les yeux.", "Avant un mariage, tout le monde panique sur la tenue. En France, les mariages peuvent être très formels (costume cravate, robe longue) ou très décontractés.", "Baptême, communion, mariage — les grands événements familiaux français. On en parle au bureau, entre collègues, le lundi matin.", "À la fin d'un grand repas de fête. Vous remerciez les hôtes. En France, on complimente TOUJOURS le repas, même si c'était moyen.", "Le lendemain d'une fête (mariage, soirée). Vous racontez votre nuit. La formule *\"jusqu'à X heures du matin\"* est standard.", "Vous ouvrez un cadeau d'anniversaire ou de Noël. Le rituel français : d'abord vous dites merci, puis vous minimisez le geste (\"il ne fallait pas\"), puis vous complimentez.", "Version plus formelle du vœu de Nouvel An. Pour les collègues, les supérieurs, les personnes âgées. On utilise le *\"vous\"* et on ajoute *\"et votre famille\"*.", "Le lendemain d'un dîner, d'une fête. Vous envoyez un SMS ou une carte. Le remerciement doit être envoyé dans les 24-48h.", "Après un week-end chez des amis, un dîner important, un séjour. La carte postale ou la carte de remerciement est TRÈS appréciée en France.", "La formule de clôture sur une carte, un email, un message après une fête. C'est la promesse qu'on va rester en contact."]}, "12": {"theme": "Urgences & emotions", "count": 25, "expressions": ["Excusez-moi, je suis perdu. Vous savez où se trouve la rue de Rivoli ?", "Bonjour, je cherche cette adresse — c'est par où ? Je ne trouve pas le numéro.", "C'est à combien de minutes à pied ?", "Vous pouvez me montrer sur le plan ? Je suis complètement perdu.", "Excusez-moi, je dois aller à la station Châtelet — c'est la bonne direction ?", "Je stresse trop — j'ai un entretien demain et je n'arrive pas à dormir.", "Ça me fait peur, honnêtement — je ne sais pas si je vais y arriver.", "J'ai des doutes sur ce projet — tu es sûr que ça va marcher ?", "Je n'en peux plus re à partager.", "Un ami traverse une période difficile. Vous posez votre main sur son épaule et vous dites *\"ça va aller\"*. C'est la phrase la plus réconfortante du français parlé.", "Vous offrez votre soutien à un ami. Cette phrase est puissante. En France, on la dit avec sincérité, sans emphase excessive. Le *\"si tu as besoin\"* qui suit est presque obligatoire.", "Avant un examen, un entretien, une épreuve. Vous encouragez quelqu'un. La formule inclut la **certitude** du résultat.", "Quelqu'un s'inquiète pour quelque chose. Vous le rassurez. *\"Ne t'en fais pas\"* (familier) ou *\"Ne vous en faites pas\"* (formel/pluriel).", "À la fin d'une conversation difficile, en quittant un ami qui traverse une épreuve, ou simplement en fin d'appel. C'est une formule d'affection vraie."]}};

function getAudioUrl(month, index) {
  const key = String(month);
  const files = AUDIO_FILES[key];
  if (files && index < files.length) {

  return "";

function buildPage() {
  const nav = document.getElementById("monthNav");
  const app = document.getElementById("app");

  // Build month tabs
  Object.keys(MONTHS).forEach((key, i) => {
    const btn = document.createElement("button");
    btn.className = "month-btn" + (i === 0 ? " active" : "");
    btn.textContent = `${MONTH_NAMES[i]}: ${MONTHS[key].theme.substring(0, 18)}`;
    btn.onclick = () => switchMonth(Number(key));
    nav.appendChild(btn);
  });

  // Build month sections
  Object.keys(MONTHS).forEach((key) => {
    const m = MONTHS[key];
    const section = document.createElement("div");
    section.className = "month-section" + (Number(key) === 1 ? " active" : "");
    section.id = `month-${key}`;
    section.dataset.month = key;

    const title = document.createElement("h2");
    title.className = "month-title";
    title.textContent = `Mois ${String(key).padStart(2, "0")}`;
    section.appendChild(title);

    const sub = document.createElement("p");
    sub.className = "month-subtitle";
    sub.textContent = m.theme;
    section.appendChild(sub);

    m.expressions.forEach((fr, i) => {
      const ctx = m.contexts[i] || "";
      const card = document.createElement("div");
      card.className = "expr-card";
      card.id = `expr-${key}-${i}`;

      card.innerHTML = `
        <div class="expr-number">Expression ${i + 1} / ${m.count}</div>
        <div class="expr-french">${fr}</div>
        <div class="expr-english">${EN_TRANSLATIONS[key]?.[i] || ""}</div>
        ${ctx ? `<div class="expr-context">${ctx}</div>` : ""}
        <div class="audio-row">
          <audio controls preload="none">
            <source src="${getAudioUrl(Number(key), i)}" type="audio/mpeg">
          </audio>
          <button class="btn btn-navy record-btn" data-month="${key}" data-idx="${i}">
            🎤 Record
          </button>
          <button class="btn btn-playback play-rec-btn" data-month="${key}" data-idx="${i}" style="display:none">
            ▶ Play
          </button>
        </div>
        <div class="echo-steps">
          <span class="step-listen">👂 Listen</span>
          <span>→</span>
          <span class="step-record">🎤 Record</span>
          <span>→</span>
          <span class="step-compare">🔁 Compare</span>
        </div>
      `;

      section.appendChild(card);
    });

    app.appendChild(section);
  });

  document.getElementById("loadingEl").style.display = "none";

  // Attach record/playback handlers
  document.querySelectorAll(".record-btn").forEach(btn => {
    btn.addEventListener("click", handleRecord);
  });
  document.querySelectorAll(".play-rec-btn").forEach(btn => {
    btn.addEventListener("click", handlePlayback);
  });
}

function switchMonth(num) {
  currentMonth = num;
  document.querySelectorAll(".month-btn").forEach((btn, i) => {
    btn.classList.toggle("active", i === num - 1);
  });
  document.querySelectorAll(".month-section").forEach(el => {
    el.classList.toggle("active", Number(el.dataset.month) === num);
  });
}

// ===== RECORDING =====
const recordings = {};

async function handleRecord(e) {
  const btn = e.currentTarget;
  const month = btn.dataset.month;
  const idx = btn.dataset.idx;
  const key = `${month}-${idx}`;
  const playBtn = document.querySelector(`.play-rec-btn[data-month="${month}"][data-idx="${idx}"]`);

  if (btn.classList.contains("btn-recording")) {
    // Stop recording
    if (recordings[key]?.mediaRecorder && recordings[key].mediaRecorder.state === "recording") {
      recordings[key].mediaRecorder.stop();
    }
    btn.classList.remove("btn-recording");
    btn.textContent = "🎤 Record";
    return;
  }

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert("Recording requires HTTPS. Open this page on en.snapenglish.fr (not locally) and allow microphone access.");
    btn.classList.remove("btn-recording");
    btn.textContent = "🎤 Record";
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mediaRecorder = new MediaRecorder(stream);
    const chunks = [];

    mediaRecorder.ondataavailable = (evt) => chunks.push(evt.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(chunks, { type: "audio/webm" });
      if (chunks.length === 0) {
        alert("No audio captured. Please check your microphone.");
        btn.classList.remove("btn-recording");
        btn.textContent = "🎤 Record";
        stream.getTracks().forEach(t => t.stop());
        return;
      }
      recordings[key] = { blob, url: URL.createObjectURL(blob) };
      stream.getTracks().forEach(t => t.stop());
      playBtn.style.display = "inline-flex";
      playBtn.textContent = "▶ Play";
      btn.classList.remove("btn-recording");
      btn.textContent = "🎤 Re-record";

      // Mark echo step
      const card = btn.closest(".expr-card");
      card.querySelector(".step-record").classList.add("step-done");
    };

    recordings[key] = { mediaRecorder };
    mediaRecorder.start();
    btn.classList.add("btn-recording");
    btn.textContent = "⏹ Stop";
  } catch (err) {
    alert("Microphone access denied. Please allow microphone access to use recording.");
    console.error(err);
  }
}

function handlePlayback(e) {
  const btn = e.currentTarget;
  const month = btn.dataset.month;
  const idx = btn.dataset.idx;
  const key = `${month}-${idx}`;
  const rec = recordings[key];
  if (rec?.url) {
    const audio = new Audio(rec.url);
    audio.play();
  }
}
