[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/bouche-a-oreille"
  to = "/bouche-a-oreille.html"
  status = 200

[[redirects]]
  from = "/mois-01"
  to = "/mois-01.html"
  status = 200

[[redirects]]
  from = "/blog/improve-french-pronunciation-english-speakers"
  to = "/blog-improve-french-pronunciation-english-speakers.html"
  status = 200

[[redirects]]
  from = "/blog/cant-hear-american-accent-french"
  to = "/blog-cant-hear-american-accent-french.html"
  status = 200

[[redirects]]
  from = "/blog/think-in-french-stop-translating"
  to = "/blog-think-in-french-stop-translating.html"
  status = 200

[[redirects]]
  from = "/blog/french-phrases-locals-actually-use"
  to = "/blog-french-phrases-locals-actually-use.html"
  status = 200

[[redirects]]
  from = "/blog/30-calques-english-speakers-french"
  to = "/blog-30-calques-english-speakers-french.html"
  status = 200

[[redirects]]
  from = "/blog/how-to-sound-less-foreign-french"
  to = "/blog-how-to-sound-less-foreign-french.html"
  status = 200

[[redirects]]
  from = "/blog/french-small-talk-after-bonjour"
