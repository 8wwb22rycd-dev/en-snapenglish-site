function audioFile(num, idx) {
  const f = files[num];
  const v = f[idx-1];
  if (typeof v === 'number') {
    return `/audio/mois-${num}/expression-${String(v).padStart(2,'0')}.mp3`;
  }
  return `/audio/mois-${num}/expression-${String(idx).padStart(2,'0')}-${v}.mp3`;
}

let navHtml = '';
let contentHtml = '';
for (const m of months) {
  navHtml += `<a href="#m${m.num}">${m.emoji} M${m.num}</a>`;

  let rowsHtml = '';
  for (const [idx, text, en] of m.exprs) {
    const src = audioFile(m.num, idx);
    rowsHtml += `
    <div class="expr-row" id="m${m.num}-e${String(idx).padStart(2,'0')}">
      <span class="expr-num">${String(idx).padStart(2,'0')}</span>
      <span class="expr-text"><strong>${text}</strong>${en ? `<br><span style="font-size:0.8rem;opacity:0.65;font-style:italic;">${en}</span>` : ''}</span>
      <audio controls preload="none"><source src="${src}" type="audio/mpeg" /></audio>
    </div>`;
  }

  contentHtml += `
  <div class="month-block" id="m${m.num}">
    <div class="month-title">
      <span class="emoji">${m.emoji}</span>
      Mois ${m.num} — ${m.theme}
      <span class="badge">${m.slug}</span>
    </div>
    ${rowsHtml}
  </div>`;
}

document.getElementById('topNav').innerHTML = navHtml;
document.getElementById('content').innerHTML = contentHtml;
