function audioFile(num, idx) {
  const f = files[num];
  const v = f[idx-1];
  if (typeof v === 'number') {
    return `/audio/mois-${num}/expression-${String(v).padStart(2,'0')}.mp3`;
  }
  return `/audio/mois-${num}/expression-${String(idx).padStart(2,'0')}-${v}.mp3`;
}

    const src = audioFile(m.num, idx);
    rowsHtml += `

}
