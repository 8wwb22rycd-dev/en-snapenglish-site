<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — French Guides & Experiences | I Can Speak French</title>
<meta name="description" content="Browse all LiveFrench guides and experiences — learn the French you'll actually hear in France, with native audio. Travel French, café etiquette, summer phrases and more.">
<link rel="canonical" href="https://en.snapenglish.fr/shop">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta property="og:title" content="Shop — French Guides & Experiences">
<meta property="og:description" content="All LiveFrench guides and experiences in one place — learn the French you'll actually hear in France.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{ --cream:#F7F4EF; --warm:#EDE8DF; --navy:#1B2A4A; --charcoal:#2C2C2C; --gold:#B8975A; --white:#FDFCFA;
  --font-display:'Playfair Display',Georgia,serif; --font-body:'DM Sans',system-ui,sans-serif; --line:#E7DFCF; }
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--cream);color:var(--charcoal);line-height:1.7;-webkit-font-smoothing:antialiased;}
/* NAV (matches site) */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;background:rgba(247,244,239,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(180,160,120,0.14);}
.nav-brand{display:flex;align-items:center;gap:0.6rem;text-decoration:none;}
.nav-brand-text{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--navy);display:flex;flex-direction:column;line-height:1.05;}
.nav-brand-mark{font-family:var(--font-display);font-style:italic;font-weight:400;font-size:0.72rem;color:var(--gold);letter-spacing:0.04em;margin-top:0.1rem;}
.nav-right{display:flex;align-items:center;gap:1.3rem;}
.nav-link{font-size:0.82rem;font-weight:500;color:var(--navy);text-decoration:none;opacity:0.65;transition:opacity 0.2s;}
.nav-link:hover{opacity:1;}
.nav-link.active{opacity:1;color:var(--gold);font-weight:600;}
@media(max-width:600px){.nav-right{gap:0.9rem;}}
/* HERO */
.hero{text-align:center;padding:4rem 1.5rem 2.5rem;max-width:640px;margin:0 auto;}
.hero-kicker{font-size:0.66rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.hero h1{font-family:var(--font-display);font-size:clamp(2.2rem,7vw,3rem);font-weight:600;color:var(--navy);line-height:1.05;margin-bottom:0.8rem;}
.hero p{font-size:1rem;color:#5d5950;line-height:1.7;max-width:480px;margin:0 auto;}
.hero-rule{width:48px;height:2px;background:var(--gold);opacity:0.5;margin:1.5rem auto 0;}
/* GRID */
.shop{max-width:920px;margin:0 auto;padding:1rem 1.25rem 5rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.4rem;}
.card{background:var(--white);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 3px 18px rgba(27,42,74,0.06);display:flex;flex-direction:column;transition:transform 0.2s,box-shadow 0.2s;}
.card:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(27,42,74,0.14);}
.card-img{height:160px;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.45s;}
.card:hover .card-img img{transform:scale(1.05);}
.card-body{padding:1.3rem 1.4rem 1.5rem;display:flex;flex-direction:column;flex:1;}
.card-sub{font-size:0.62rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem;}
.card-title{font-family:var(--font-display);font-size:1.2rem;font-weight:600;color:var(--navy);line-height:1.2;margin-bottom:0.6rem;}
.card-desc{font-size:0.86rem;color:#5d5950;line-height:1.55;flex:1;margin-bottom:1.2rem;}
.card-btn{display:inline-block;text-align:center;background:var(--navy);color:var(--cream);font-size:0.86rem;font-weight:600;padding:0.75rem 1rem;border-radius:6px;text-decoration:none;transition:opacity 0.2s;}
.card-btn:hover{opacity:0.88;}
.card-price{font-size:0.72rem;color:var(--gold);font-weight:600;margin-bottom:0.8rem;}
footer{background:var(--navy);color:rgba(247,244,239,0.6);padding:2rem 1.5rem;text-align:center;}
footer p{font-size:0.78rem;opacity:0.55;}
footer a{color:inherit;}
</style>
</head>
<body>

<nav role="navigation" aria-label="Main navigation">
  <a href="/" class="nav-brand">
    <svg width="26" height="26" viewBox="0 0 30 30" fill="none"><path d="M25 15C25 9.5 20.5 5 15 5C9.5 5 5 9.5 5 15C5 20.5 9.5 25 15 25C18.8 25 22.1 22.9 24 19.8" stroke="#1B2A4A" stroke-width="3.2" stroke-linecap="round" fill="none"/></svg>
    <span class="nav-brand-text">SnapEnglish<span class="nav-brand-mark">Bouche-à-oreille</span></span>
  </a>
  <div class="nav-right">
    <a href="/blog" class="nav-link">Blog</a>
    <a href="/shop" class="nav-link active">Shop</a>
  </div>
</nav>

<!-- HERO -->
<header class="hero">
  <div class="hero-kicker">LiveFrench Collection 🇫🇷</div>
  <h1>French Guides &amp; Experiences</h1>
  <p>Learn the French you'll actually hear in France — with native audio, real situations and a touch of French elegance. Browse the whole collection.</p>
  <div class="hero-rule"></div>
</header>

<!-- SHOP GRID -->
<main class="shop">
  <div class="grid" id="shop-grid"></div>
</main>

<footer>
  <p>© 2026 SnapEnglish · Caroline Cousin · <a href="https://snapenglish.fr/mentions-legales">Legal</a></p>
</footer>

<script>
/* ============================================================
   ====  YOUR PRODUCTS — EDIT HERE  ===========================
   To change a product: edit title / sub / desc / price / image / link / button.
   Images live in /images/. External links open in a new tab automatically.
   To add a product: copy one { ... } block.
   ============================================================ */
const PRODUCTS = [
  { title:"Stay Cool in France", sub:"Summer French Experience",
    desc:"25 essential phrases with native audio + a full French Summer Guide to enjoy France like a local, even in a heatwave.",
    price:"☀️ Interactive guide", image:"/images/shop-staycool.jpg",
    link:"/stay-cool-in-france.html", button:"Start the experience" },
  { title:"A Week With Me in Paris", sub:"7 Days · 35 Expressions",
    desc:"Learn the French you'll actually hear in Paris — cafés, markets, metro and daily life — with native audio and an interactive speaking platform.",
    price:"From $19", image:"/images/scf-paris.jpg",
    link:"/a-week-with-me-in-paris", button:"Explore" },
  { title:"French Café Etiquette", sub:"Coffee like a local",
    desc:"10 insider habits every visitor should know before ordering coffee in France. A beautiful, illustrated guide.",
    price:"Bonus guide", image:"/images/scf-cafe.jpg",
    link:"/cafe-etiquette.html", button:"Read the guide" },
  { title:"Bonjour, Baguette & Voisins", sub:"Everyday French",
    desc:"25 authentic expressions for the bakery, the market and neighbourhood life — each with native audio.",
    price:"On Etsy", image:"/images/scf-baguette.jpg",
    link:"https://www.etsy.com/listing/4529032646/french-phrasebook-for-everyday-life-in", button:"Discover" },
  { title:"Getting Around in France", sub:"Travel French",
    desc:"25 travel phrases for trains, metro, taxis and driving across France — each with native audio.",
    price:"On Etsy", image:"/images/scf-transport.jpg",
    link:"https://www.etsy.com/listing/4529038919/french-phrasebook-for-transport-in", button:"Discover" },
  { title:"Bouche à Oreille — 300 Expressions", sub:"The complete programme",
    desc:"The full French speaking programme — 300 authentic expressions, native audio by Caroline, and interactive practice across 12 themes.",
    price:"$12/month or $99 lifetime", image:"/images/shop-bouche.jpg",
    link:"/bouche-a-oreille", button:"Discover" },
];

/* Render the product cards */
document.getElementById('shop-grid').innerHTML = PRODUCTS.map(function(p){
  var external = /^https?:\/\//.test(p.link);
  var attrs = external ? ' target="_blank" rel="noopener noreferrer"' : '';
  return '<article class="card">'+
    '<div class="card-img"><img src="'+p.image+'" alt="'+p.title+'" loading="lazy"></div>'+
    '<div class="card-body">'+
      '<div class="card-sub">'+p.sub+'</div>'+
      '<h2 class="card-title">'+p.title+'</h2>'+
      '<p class="card-desc">'+p.desc+'</p>'+
      '<div class="card-price">'+p.price+'</div>'+
      '<a class="card-btn" href="'+p.link+'"'+attrs+'>'+p.button+' →</a>'+
    '</div></article>';
}).join('');
</script>
</body>
</html>
